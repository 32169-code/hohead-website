<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>浩凯达科技</title>
    <script>
      // 单页应用路由重定向（GitHub Pages SPA 支持）
      // 将当前 URL 保存到 sessionStorage，然后重定向到首页
      sessionStorage.redirect = location.href;
      // 获取 base 路径（从当前路径中提取）
      var pathSegments = location.pathname.split('/');
      var repoName = pathSegments[1]; // 例如 'hohead-website'
      var basePath = '/' + repoName + '/';
      location.replace(basePath);
    </script>
  </head>
  <body>
    <p>正在跳转...</p>
  </body>
</html>
